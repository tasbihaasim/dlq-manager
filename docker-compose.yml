
services:

  db:
    image: postgres
    environment:
      POSTGRES_USER: tasbihadb
      POSTGRES_PASSWORD: localdb
      POSTGRES_DB: webhookdb
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - rabbitmq
      - redis
    env_file:
      - .env